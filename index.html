<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tristonia.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #533483 100%);
        }
        canvas { display: block; }

        .title-container {
            position: absolute;
            top: 80px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        .main-title {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: #fff;
            text-shadow: 0 0 40px rgba(120, 180, 255, 0.5), 0 0 80px rgba(120, 180, 255, 0.2);
            opacity: 0;
            animation: title-fade-in 2s ease-out 0.5s forwards;
        }
        .main-subtitle {
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
            opacity: 0;
            animation: title-fade-in 2s ease-out 1s forwards;
        }
        @keyframes title-fade-in {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Modern glassmorphism nav */
        .nav-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 6px;
            padding: 6px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            opacity: 0;
            animation: nav-fade-in 1s ease-out 0.3s forwards;
        }
        @keyframes nav-fade-in {
            from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .nav-link {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            padding: 10px 22px;
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.12);
        }

        /* Loading overlay */
        #loading {
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: rgba(120, 180, 255, 0.8);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .main-title { font-size: 1.8rem; }
            .main-subtitle { font-size: 0.7rem; }
            .nav-link { font-size: 0.6rem; padding: 8px 14px; }
            .nav-bar { gap: 2px; padding: 4px; }
        }
    </style>
</head>
<body>
    <div id="loading"><div class="loader"></div></div>

    <div class="title-container">
        <div class="main-title">TRISTONIA</div>
        <div class="main-subtitle">THE FLOATING REALM</div>
    </div>

    <nav class="nav-bar">
        <a href="about.html" class="nav-link">About</a>
        <a href="apps.html" class="nav-link">Apps</a>
        <a href="contact.html" class="nav-link">Contact</a>
        <a href="privacy-policy.html" class="nav-link">Privacy</a>
    </nav>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.008);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- Post Processing ---
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.6,   // strength
            0.8,   // radius
            0.4    // threshold
        );
        composer.addPass(bloomPass);

        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.04;
        controls.minDistance = 30;
        controls.maxDistance = 90;
        controls.maxPolarAngle = Math.PI / 1.9;
        controls.enablePan = false;
        controls.rotateSpeed = 0.5;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;

        // --- Lighting ---
        const hemiLight = new THREE.HemisphereLight(0x78b4ff, 0x3a1f5e, 0.6);
        scene.add(hemiLight);

        const moonLight = new THREE.DirectionalLight(0xc4d4ff, 1.5);
        moonLight.position.set(25, 40, 20);
        moonLight.castShadow = true;
        moonLight.shadow.mapSize.set(2048, 2048);
        moonLight.shadow.camera.left = -40;
        moonLight.shadow.camera.right = 40;
        moonLight.shadow.camera.top = 40;
        moonLight.shadow.camera.bottom = -40;
        moonLight.shadow.camera.far = 100;
        moonLight.shadow.bias = -0.001;
        scene.add(moonLight);

        const fillLight = new THREE.DirectionalLight(0xffa0d0, 0.3);
        fillLight.position.set(-20, 10, -15);
        scene.add(fillLight);

        const rimLight = new THREE.PointLight(0x78b4ff, 1, 60);
        rimLight.position.set(-15, 5, 20);
        scene.add(rimLight);

        // --- Material Helpers ---
        function mat(color, opts = {}) {
            return new THREE.MeshStandardMaterial({
                color,
                roughness: opts.roughness ?? 0.7,
                metalness: opts.metalness ?? 0.0,
                flatShading: false,
                ...opts,
            });
        }

        function glassMat(color) {
            return new THREE.MeshPhysicalMaterial({
                color,
                roughness: 0.05,
                metalness: 0.1,
                transmission: 0.6,
                thickness: 0.5,
                transparent: true,
                opacity: 0.85,
            });
        }

        // --- Smooth Geometry Helpers ---
        function createSmoothCylinder(rTop, rBot, h, color, x, y, z, opts = {}) {
            const geo = new THREE.CylinderGeometry(rTop, rBot, h, opts.segments ?? 32);
            const m = new THREE.Mesh(geo, mat(color, opts));
            m.position.set(x, y, z);
            m.castShadow = true;
            m.receiveShadow = true;
            return m;
        }

        function createSphere(r, color, x, y, z, opts = {}) {
            const geo = new THREE.SphereGeometry(r, 32, 24);
            const m = new THREE.Mesh(geo, mat(color, opts));
            m.position.set(x, y, z);
            m.castShadow = true;
            m.receiveShadow = true;
            return m;
        }

        function createCone(r, h, color, x, y, z, opts = {}) {
            const geo = new THREE.ConeGeometry(r, h, opts.segments ?? 16);
            const m = new THREE.Mesh(geo, mat(color, opts));
            m.position.set(x, y, z);
            m.castShadow = true;
            return m;
        }

        function createBox(w, h, d, color, x, y, z, opts = {}) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const m = new THREE.Mesh(geo, mat(color, opts));
            m.position.set(x, y, z);
            m.castShadow = true;
            m.receiveShadow = true;
            return m;
        }

        // --- Floating Island (Smooth Organic Shape) ---
        const islandGroup = new THREE.Group();

        // Top terrain - smooth rounded cylinder layers
        const terrainTop = createSmoothCylinder(17, 16.5, 2.5, '#4a7c59', 0, 0, 0, { segments: 48, roughness: 0.85 });
        islandGroup.add(terrainTop);

        // Grass surface - slightly larger disc
        const grassDisc = createSmoothCylinder(17.2, 17, 0.3, '#5a9e6f', 0, 1.3, 0, { segments: 48, roughness: 0.9 });
        islandGroup.add(grassDisc);

        // Rock layers tapering down — smooth organic
        const rockColors = ['#8c6b50', '#7a5c42', '#6d4c3c', '#5e3f30', '#4a3225'];
        const rockLayers = [
            { rT: 16.5, rB: 15, h: 3, y: -2.8 },
            { rT: 15, rB: 13, h: 3, y: -5.8 },
            { rT: 13, rB: 10.5, h: 3.5, y: -9 },
            { rT: 10.5, rB: 7, h: 4, y: -12.5 },
            { rT: 7, rB: 3, h: 5, y: -16.5 },
        ];
        rockLayers.forEach((l, i) => {
            islandGroup.add(createSmoothCylinder(l.rT, l.rB, l.h, rockColors[i], 0, l.y, 0, { segments: 36, roughness: 0.9 }));
        });

        // Small floating rock fragments
        const fragments = [
            { r: 1.2, x: 8, y: -20, z: 5 },
            { r: 1.5, x: -10, y: -21, z: -3 },
            { r: 1, x: -4, y: -23, z: 3 },
            { r: 0.8, x: 12, y: -22, z: -4 },
            { r: 1.3, x: -13, y: -24, z: 5 },
        ];
        fragments.forEach(f => {
            islandGroup.add(createSphere(f.r, '#5e3f30', f.x, f.y, f.z, { roughness: 0.95 }));
        });

        scene.add(islandGroup);

        // --- Modern Tree ---
        function createTree(x, y, z, scale = 1) {
            const tree = new THREE.Group();
            // Trunk - smooth cylinder
            tree.add(createSmoothCylinder(0.2 * scale, 0.35 * scale, 2.5 * scale, '#6b4c3b', 0, 1.25 * scale, 0, { segments: 12, roughness: 0.9 }));
            // Canopy - layered spheres for organic look
            const leafColor = '#3d8b5e';
            const leafLight = '#52a872';
            tree.add(createSphere(1.8 * scale, leafColor, 0, 3.5 * scale, 0, { roughness: 0.85 }));
            tree.add(createSphere(1.4 * scale, leafLight, 0.5 * scale, 4.2 * scale, 0.3 * scale, { roughness: 0.85 }));
            tree.add(createSphere(1.1 * scale, leafColor, -0.6 * scale, 3.8 * scale, -0.4 * scale, { roughness: 0.85 }));
            tree.position.set(x, y, z);
            return tree;
        }

        // --- Modern Village House ---
        function createVillageHouse(x, y, z, rotation = 0) {
            const house = new THREE.Group();
            // Walls - warm cream
            house.add(createBox(2.2, 2, 2.8, '#f0e6d8', 0, 1, 0, { roughness: 0.8 }));
            // Roof - gentle slope
            const roofGeo = new THREE.ConeGeometry(2.4, 1.8, 4);
            const roofMat = mat('#b85c3c', { roughness: 0.7 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.set(0, 2.9, 0);
            roof.rotation.y = Math.PI / 4;
            roof.castShadow = true;
            house.add(roof);
            // Window - glowing
            const windowGeo = new THREE.PlaneGeometry(0.5, 0.6);
            const windowMat = new THREE.MeshStandardMaterial({ color: '#ffd97d', emissive: '#ffd97d', emissiveIntensity: 0.8, roughness: 0.2 });
            const win1 = new THREE.Mesh(windowGeo, windowMat);
            win1.position.set(0.5, 1.2, 1.41);
            house.add(win1);
            const win2 = win1.clone();
            win2.position.set(-0.5, 1.2, 1.41);
            house.add(win2);
            // Door
            house.add(createBox(0.5, 0.9, 0.1, '#6b4c3b', 0, 0.45, 1.41, { roughness: 0.9 }));
            // Chimney
            house.add(createSmoothCylinder(0.2, 0.25, 1.2, '#8d7a6e', 0.7, 3.4, -0.5, { segments: 8, roughness: 0.9 }));
            house.position.set(x, y, z);
            house.rotation.y = rotation;
            return house;
        }

        // --- Modern Skyscraper ---
        function createSkyscraper(w, h, d, color, x, y, z) {
            const building = new THREE.Group();
            // Main body with rounded edges
            const geo = new THREE.BoxGeometry(w, h, d, 1, 1, 1);
            const body = new THREE.Mesh(geo, glassMat(color));
            body.position.y = h / 2;
            body.castShadow = true;
            body.receiveShadow = true;
            building.add(body);

            // Glowing window strips
            const stripCount = Math.floor(h / 2);
            for (let i = 1; i < stripCount; i++) {
                const yPos = i * 2;
                if (yPos < h - 1) {
                    const stripGeo = new THREE.PlaneGeometry(w * 0.85, 0.3);
                    const stripMat = new THREE.MeshStandardMaterial({
                        color: '#78b4ff',
                        emissive: '#78b4ff',
                        emissiveIntensity: 0.4 + Math.random() * 0.3,
                        transparent: true,
                        opacity: 0.7,
                    });
                    const strip = new THREE.Mesh(stripGeo, stripMat);
                    strip.position.set(0, yPos, d / 2 + 0.01);
                    building.add(strip);
                    const strip2 = strip.clone();
                    strip2.position.set(0, yPos, -d / 2 - 0.01);
                    strip2.rotation.y = Math.PI;
                    building.add(strip2);
                }
            }

            // Rooftop accent light
            const accentGeo = new THREE.SphereGeometry(0.3, 16, 12);
            const accentMat = new THREE.MeshStandardMaterial({ color: '#ff6b6b', emissive: '#ff6b6b', emissiveIntensity: 1.5 });
            const accent = new THREE.Mesh(accentGeo, accentMat);
            accent.position.set(0, h + 0.5, 0);
            building.add(accent);

            building.position.set(x, y, z);
            return building;
        }

        // --- Modern Castle ---
        function buildCastle() {
            const castle = new THREE.Group();
            const stoneColor = '#d4cfc8';
            const roofColor = '#4a7ec2';
            const darkStone = '#b5afa6';
            const gold = '#ffd700';

            // Main keep
            castle.add(createSmoothCylinder(3.5, 3.8, 12, stoneColor, 8, 7, 0, { segments: 24, roughness: 0.85 }));
            // Keep roof
            castle.add(createCone(4, 5, roofColor, 8, 15.5, 0, { segments: 24, roughness: 0.4, metalness: 0.2 }));
            // Flag pole + glow
            castle.add(createSmoothCylinder(0.08, 0.08, 2, gold, 8, 18.5, 0, { segments: 8 }));
            const flagGeo = new THREE.PlaneGeometry(1.2, 0.7);
            const flagMat = new THREE.MeshStandardMaterial({ color: '#e63946', emissive: '#e63946', emissiveIntensity: 0.3, side: THREE.DoubleSide });
            const flag = new THREE.Mesh(flagGeo, flagMat);
            flag.position.set(8.7, 19.2, 0);
            castle.add(flag);

            // Front wall
            castle.add(createBox(10, 6, 1.2, stoneColor, 8, 3, 6, { roughness: 0.85 }));
            // Battlements
            for (let i = -4; i <= 4; i += 2) {
                castle.add(createBox(1, 1.2, 1.4, darkStone, 8 + i, 6.6, 6, { roughness: 0.9 }));
            }

            // Gate arch
            const archGeo = new THREE.TorusGeometry(1.5, 0.3, 8, 16, Math.PI);
            const archMat = mat('#8a7e72', { roughness: 0.85 });
            const arch = new THREE.Mesh(archGeo, archMat);
            arch.position.set(8, 3.5, 6.6);
            arch.rotation.z = Math.PI;
            castle.add(arch);
            // Gate door
            castle.add(createBox(2.5, 3.5, 0.3, '#4a3828', 8, 1.75, 6.6, { roughness: 0.95 }));

            // Side towers
            [4, 12].forEach(tx => {
                castle.add(createSmoothCylinder(1.8, 2, 9, stoneColor, tx, 5.5, 5, { segments: 20, roughness: 0.85 }));
                castle.add(createCone(2.2, 3.5, roofColor, tx, 11.5, 5, { segments: 20, roughness: 0.4, metalness: 0.2 }));
                // Window glow
                const winGeo = new THREE.CircleGeometry(0.4, 16);
                const winMat = new THREE.MeshStandardMaterial({ color: '#ffd97d', emissive: '#ffd97d', emissiveIntensity: 0.9 });
                const win = new THREE.Mesh(winGeo, winMat);
                win.position.set(tx, 7, 6.1);
                castle.add(win);
            });

            // Back tower
            castle.add(createSmoothCylinder(2.5, 2.8, 15, stoneColor, 8, 8.5, -3, { segments: 24, roughness: 0.85 }));
            castle.add(createCone(3, 4.5, roofColor, 8, 17.5, -3, { segments: 24, roughness: 0.4, metalness: 0.2 }));

            // Side walls
            castle.add(createBox(1.2, 6, 8, stoneColor, 3.5, 3, 2, { roughness: 0.85 }));
            castle.add(createBox(1.2, 6, 8, stoneColor, 12.5, 3, 2, { roughness: 0.85 }));

            return castle;
        }

        const castleGroup = buildCastle();
        scene.add(castleGroup);

        // --- River & Water ---
        const waterGroup = new THREE.Group();
        // River path using a smooth curved mesh
        const riverPoints = [
            [12, 1.55, -8], [10, 1.55, -4], [7, 1.55, -1], [4, 1.55, 2],
            [1, 1.55, 4], [-2, 1.55, 6], [-5, 1.55, 8], [-8, 1.55, 10],
            [3, 1.55, 7], [3, 1.55, 10],
        ];
        riverPoints.forEach(([x, y, z]) => {
            const riverGeo = new THREE.CircleGeometry(2.2, 24);
            const riverMat = new THREE.MeshPhysicalMaterial({
                color: '#4da8da',
                roughness: 0.1,
                metalness: 0.1,
                transmission: 0.4,
                transparent: true,
                opacity: 0.8,
            });
            const riverPatch = new THREE.Mesh(riverGeo, riverMat);
            riverPatch.rotation.x = -Math.PI / 2;
            riverPatch.position.set(x, y, z);
            riverPatch.receiveShadow = true;
            waterGroup.add(riverPatch);
        });
        scene.add(waterGroup);

        // --- Landscape (Village & Trees) ---
        const landscapeGroup = new THREE.Group();

        // Village
        landscapeGroup.add(createVillageHouse(-12, 1.3, 5, 0.2));
        landscapeGroup.add(createVillageHouse(-14, 1.3, 2, -0.3));
        landscapeGroup.add(createVillageHouse(-10.5, 1.3, 7.5, 0));
        landscapeGroup.add(createVillageHouse(-9, 1.3, 4, 0.5));
        landscapeGroup.add(createVillageHouse(-14, 1.3, 7, -0.1));
        landscapeGroup.add(createVillageHouse(-14, 1.3, -1, 0.8));

        // Trees — varying sizes
        landscapeGroup.add(createTree(-6, 1.3, 6, 1));
        landscapeGroup.add(createTree(-2, 1.3, 7, 0.8));
        landscapeGroup.add(createTree(-9, 1.3, 8.5, 1.1));
        landscapeGroup.add(createTree(-13, 1.3, -2, 0.9));
        landscapeGroup.add(createTree(-15, 1.3, 4, 1.2));
        landscapeGroup.add(createTree(14, 1.3, -5, 0.7));
        landscapeGroup.add(createTree(-5, 1.3, -8, 1));
        landscapeGroup.add(createTree(0, 1.3, -3, 0.6));

        // Bushes — small smooth spheres
        for (let i = 0; i < 18; i++) {
            const bx = -16 + Math.random() * 14;
            const bz = -3 + Math.random() * 13;
            landscapeGroup.add(createSphere(0.4 + Math.random() * 0.3, '#2d6a4f', bx, 1.5, bz, { roughness: 0.85 }));
        }

        // Small flowers — emissive dots
        for (let i = 0; i < 25; i++) {
            const fx = -16 + Math.random() * 32;
            const fz = -8 + Math.random() * 16;
            const flowerColors = ['#ff6b6b', '#ffd97d', '#c77dff', '#72efdd'];
            const fc = flowerColors[Math.floor(Math.random() * flowerColors.length)];
            const flowerGeo = new THREE.SphereGeometry(0.12, 8, 8);
            const flowerMat = new THREE.MeshStandardMaterial({ color: fc, emissive: fc, emissiveIntensity: 0.6 });
            const flower = new THREE.Mesh(flowerGeo, flowerMat);
            flower.position.set(fx, 1.55, fz);
            landscapeGroup.add(flower);
        }

        // Path — subtle trail
        const pathPositions = [
            [-10, 1.42, 6.5], [-11, 1.42, 5], [-12, 1.42, 3.5], [-12.5, 1.42, 2],
        ];
        pathPositions.forEach(([x, y, z]) => {
            const pathGeo = new THREE.CircleGeometry(0.7, 16);
            const pathMat = mat('#a08060', { roughness: 0.95 });
            const pathPatch = new THREE.Mesh(pathGeo, pathMat);
            pathPatch.rotation.x = -Math.PI / 2;
            pathPatch.position.set(x, y, z);
            pathPatch.receiveShadow = true;
            landscapeGroup.add(pathPatch);
        });

        scene.add(landscapeGroup);

        // --- City (Modern Glass Skyscrapers) ---
        const cityGroup = new THREE.Group();
        cityGroup.add(createSkyscraper(3.5, 14, 4, '#4a6fa5', -10, 1.3, -5));
        cityGroup.add(createSkyscraper(3, 18, 3.5, '#5a7fb5', -5, 1.3, -6));
        cityGroup.add(createSkyscraper(3.5, 11, 3.5, '#6a8fc5', -1, 1.3, -5));
        cityGroup.add(createSkyscraper(3, 16, 3, '#4a6fa5', -7, 1.3, -9));
        cityGroup.add(createSkyscraper(3.5, 12, 3.5, '#3a5f95', -13, 1.3, -8));
        cityGroup.add(createSkyscraper(2.5, 20, 2.5, '#5a7fb5', -3, 1.3, -10));
        scene.add(cityGroup);

        // --- Waterfalls (Smooth Particle System) ---
        const particleCount = 10000;
        const positions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount);
        const opacities = new Float32Array(particleCount);
        const wf1x = -9.5, wf1z = 11;
        const wf2x = 1, wf2z = 11.5;

        for (let i = 0; i < particleCount; i++) {
            const isWF1 = i < particleCount / 2;
            positions[i * 3] = (isWF1 ? wf1x : wf2x) + Math.random() * 3;
            positions[i * 3 + 1] = 1.3 - Math.random() * 40;
            positions[i * 3 + 2] = (isWF1 ? wf1z : wf2z) + Math.random() * 0.8;
            velocities[i] = -0.15 - Math.random() * 0.2;
            opacities[i] = 0.3 + Math.random() * 0.5;
        }

        const particleGeo = new THREE.BufferGeometry();
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({
            color: '#8ecae6',
            size: 0.18,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
        });
        const waterfalls = new THREE.Points(particleGeo, particleMat);
        scene.add(waterfalls);

        // --- Clouds (Soft Spheres) ---
        const clouds = [];
        function createCloud() {
            const cloud = new THREE.Group();
            const numPuffs = 5 + Math.floor(Math.random() * 5);
            for (let i = 0; i < numPuffs; i++) {
                const r = 2 + Math.random() * 3;
                const geo = new THREE.SphereGeometry(r, 20, 16);
                const m = new THREE.MeshStandardMaterial({
                    color: '#e8edf5',
                    roughness: 1,
                    transparent: true,
                    opacity: 0.25 + Math.random() * 0.15,
                });
                const puff = new THREE.Mesh(geo, m);
                puff.position.set(
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 6
                );
                puff.scale.y = 0.5 + Math.random() * 0.3;
                cloud.add(puff);
            }
            cloud.position.set(
                (Math.random() - 0.5) * 140,
                22 + Math.random() * 15,
                (Math.random() - 0.5) * 70
            );
            cloud.speed = 0.015 + Math.random() * 0.03;
            return cloud;
        }

        for (let i = 0; i < 18; i++) {
            const cloud = createCloud();
            clouds.push(cloud);
            scene.add(cloud);
        }

        // --- Floating Particles (Ambient Magic) ---
        const floatingCount = 300;
        const floatPositions = new Float32Array(floatingCount * 3);
        for (let i = 0; i < floatingCount; i++) {
            floatPositions[i * 3] = (Math.random() - 0.5) * 80;
            floatPositions[i * 3 + 1] = -5 + Math.random() * 40;
            floatPositions[i * 3 + 2] = (Math.random() - 0.5) * 60;
        }
        const floatGeo = new THREE.BufferGeometry();
        floatGeo.setAttribute('position', new THREE.BufferAttribute(floatPositions, 3));
        const floatMat = new THREE.PointsMaterial({
            color: '#c4b5fd',
            size: 0.15,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
        });
        const floatingParticles = new THREE.Points(floatGeo, floatMat);
        scene.add(floatingParticles);

        // --- Stars Background ---
        const starCount = 500;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i * 3] = (Math.random() - 0.5) * 300;
            starPositions[i * 3 + 1] = 30 + Math.random() * 100;
            starPositions[i * 3 + 2] = (Math.random() - 0.5) * 300;
        }
        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMat = new THREE.PointsMaterial({
            color: '#ffffff',
            size: 0.3,
            transparent: true,
            opacity: 0.8,
            sizeAttenuation: true,
        });
        scene.add(new THREE.Points(starGeo, starMat));

        // --- Camera ---
        camera.position.set(5, 25, 55);
        camera.lookAt(0, 2, 0);

        // --- Animation ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            // Gentle island float
            islandGroup.position.y = Math.sin(t * 0.4) * 0.8;
            castleGroup.position.y = Math.sin(t * 0.4) * 0.8;
            landscapeGroup.position.y = Math.sin(t * 0.4) * 0.8;
            cityGroup.position.y = Math.sin(t * 0.4) * 0.8;
            waterGroup.position.y = Math.sin(t * 0.4) * 0.8;
            waterfalls.position.y = Math.sin(t * 0.4) * 0.8;

            // Waterfall particles
            const wfPos = waterfalls.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                wfPos[i * 3 + 1] += velocities[i];
                if (wfPos[i * 3 + 1] < -35) {
                    wfPos[i * 3 + 1] = 1.3;
                }
            }
            waterfalls.geometry.attributes.position.needsUpdate = true;

            // Cloud drift
            clouds.forEach(cloud => {
                cloud.position.x += cloud.speed;
                if (cloud.position.x > 100) cloud.position.x = -100;
            });

            // Floating particles gentle drift
            const fpArr = floatingParticles.geometry.attributes.position.array;
            for (let i = 0; i < floatingCount; i++) {
                fpArr[i * 3 + 1] += Math.sin(t + i) * 0.003;
                fpArr[i * 3] += Math.cos(t * 0.5 + i * 0.1) * 0.002;
            }
            floatingParticles.geometry.attributes.position.needsUpdate = true;

            // Flag wave
            const flagMesh = castleGroup.children.find(c => c.geometry && c.geometry.type === 'PlaneGeometry');
            if (flagMesh) {
                flagMesh.rotation.y = Math.sin(t * 3) * 0.15;
            }

            controls.update();
            composer.render();
        }

        // --- Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Hide loading screen ---
        document.getElementById('loading').classList.add('hidden');

        animate();
    </script>
</body>
</html>
